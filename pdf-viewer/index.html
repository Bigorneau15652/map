<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Viewer v8</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* ── Écran vide / message ───────────────────────────────── */
    #empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: #999;
      font-size: 13px; text-align: center; padding: 20px;
    }
    #empty svg { opacity: .3; }

    /* ── Écran bloqué (X-Frame-Options) ────────────────────── */
    #blocked {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 12px; padding: 24px; text-align: center;
    }
    #openbtn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #2980b9; color: #fff; border: none; border-radius: 7px;
      padding: 11px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.18); transition: background .15s;
    }
    #openbtn:hover { background: #3498db; }

    /* ── Iframe PDF ─────────────────────────────────────────── */
    #frame { display: none; width: 100%; height: 100%; border: none; }
    #frame.visible { display: block; }

    /* ── Bouton agrandissement (overlay sur l'iframe) ───────── */
    #popbtn {
      display: none; position: fixed; top: 6px; right: 6px; z-index: 99;
      background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 5px;
      padding: 5px 9px; cursor: pointer; font-size: 13px;
      gap: 5px; align-items: center; transition: background .15s;
    }
    #popbtn.visible { display: flex; }
    #popbtn:hover { background: rgba(0,0,0,.8); }

    /* ── Modal config ───────────────────────────────────────── */
    #ov {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 200;
      align-items: center; justify-content: center;
    }
    #ov.on { display: flex; }
    #box {
      background: #fff; border-radius: 8px;
      box-shadow: 0 6px 28px rgba(0,0,0,.22);
      padding: 20px; width: 270px;
    }
    #box h3 { font-size: 13px; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid #e0e0e0; color: #333; }
    .row { margin-bottom: 12px; }
    .row label { display: block; font-size: 10px; font-weight: 700;
      color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .rf { display: flex; gap: 6px; }
    .rf select, .row select {
      width: 100%; padding: 7px 9px; border: 1px solid #ccc; border-radius: 5px;
      font-size: 12px; color: #333; background: #fff;
    }
    #bref { padding: 0 10px; border: 1px solid #ccc; border-radius: 5px;
      background: #fff; cursor: pointer; font-size: 16px; flex-shrink: 0; }
    .acts { display: flex; gap: 8px; margin-top: 16px; }
    .ok, .no { flex: 1; padding: 8px; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 700; cursor: pointer; }
    .ok { background: #2980b9; color: #fff; }
    .ok:hover { background: #3498db; }
    .no { background: #ecf0f1; color: #333; }
    #cfgerr { display:none; margin-top:8px; font-size:11px; color:#c0392b;
      background:#fdf0ef; padding:6px 8px; border-radius:4px; line-height:1.5; }
    #hint { margin-top:10px; font-size:10px; color:#666; line-height:1.6;
      background:#eef6ff; padding:7px 9px; border-radius:4px;
      border-left:3px solid #2980b9; }
  </style>
</head>
<body>

<!-- État vide -->
<div id="empty">
  <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
    <rect x="3" y="1" width="20" height="26" rx="2" fill="#888" stroke="#888" stroke-width="1.2"/>
    <path d="M19 1L23 5H19V1Z" fill="#aaa"/>
    <text x="13" y="20" text-anchor="middle" font-size="7" font-weight="bold"
      fill="white" font-family="sans-serif">PDF</text>
  </svg>
  <span id="emptymsg">Sélectionnez une ligne dans le tableau</span>
</div>

<!-- État bloqué (X-Frame-Options) : bouton proéminent -->
<div id="blocked">
  <p id="blockedname" style="font-size:12px;color:#666;margin-bottom:4px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></p>
  <button id="openbtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-9 9M3 21l9-9"/>
    </svg>
    Ouvrir dans une fenêtre séparée
  </button>
</div>

<!-- Visionneuse intégrée -->
<iframe id="frame" allowfullscreen></iframe>

<!-- Bouton agrandissement (overlay) -->
<button id="popbtn" title="Ouvrir dans une fenêtre séparée">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M15 3h6v6M9 21H3v-6M21 3l-9 9M3 21l9-9"/>
  </svg>
  Agrandir
</button>

<!-- Modal paramètres -->
<div id="ov">
  <div id="box">
    <h3>⚙ Paramètres — PDF Viewer</h3>
    <div class="row">
      <label>Colonne PDF</label>
      <div class="rf">
        <select id="csel"><option value="">— sélectionner —</option></select>
        <button id="bref" title="Recharger colonnes">⟳</button>
      </div>
    </div>
    <div class="row">
      <label>Type</label>
      <select id="ctype">
        <option value="url">URL (texte)</option>
        <option value="attachment">Pièce jointe Grist</option>
      </select>
    </div>
    <div id="hint">
      💡 Liste vide ? Dans Grist, panneau de droite → <strong>Données</strong>
      → sélectionnez votre table, puis ↺
    </div>
    <div id="cfgerr"></div>
    <div class="acts">
      <button class="no" id="bno">Annuler</button>
      <button class="ok" id="bok">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const WIN_NAME = 'grist-pdf-viewer';
const st = { col: null, type: 'url', url: null, cols: [] };

const frame    = document.getElementById('frame');
const empty    = document.getElementById('empty');
const emptymsg = document.getElementById('emptymsg');
const blocked  = document.getElementById('blocked');
const popbtn   = document.getElementById('popbtn');
const openbtn  = document.getElementById('openbtn');
const ov       = document.getElementById('ov');
const csel     = document.getElementById('csel');
const ctype    = document.getElementById('ctype');
const cfgerr   = document.getElementById('cfgerr');

function isSameOrigin(url) {
  try { return new URL(url).origin === location.origin; } catch { return false; }
}

function openPopup(url) {
  const w = screen.width  > 1400 ? 1200 : screen.width  - 100;
  const h = screen.height > 900  ? 860  : screen.height - 100;
  const l = Math.max(0, (screen.width  - w) / 2);
  const t = Math.max(0, (screen.height - h) / 2);
  const win = window.open(url, WIN_NAME, `width=${w},height=${h},left=${l},top=${t},resizable=yes`);
  if (win) win.focus();
}

// ── Affichage des états ───────────────────────────────────────────────────────
function showEmpty(msg) {
  st.url = null;
  frame.src = ''; frame.classList.remove('visible');
  empty.style.display = 'flex'; emptymsg.textContent = msg;
  blocked.style.display = 'none';
  popbtn.classList.remove('visible');
}

function showPDF(url) {
  empty.style.display = 'none';
  blocked.style.display = 'none';
  frame.classList.add('visible');
  popbtn.classList.add('visible');

  // Détection X-Frame-Options : si le serveur bloque l'iframe,
  // le navigateur navigue vers about:blank et déclenche load
  frame.onload = () => {
    try {
      const href = frame.contentWindow.location.href;
      // Si about:blank alors que l'on attendait un vrai PDF → bloqué
      if (href === 'about:blank') {
        showBlocked(url);
      }
      // Si href accessible et valide → même origine, OK
    } catch {
      // SecurityError = contenu cross-origin chargé avec succès → OK
    }
  };

  frame.src = url;
}

function showBlocked(url) {
  frame.src = ''; frame.classList.remove('visible');
  popbtn.classList.remove('visible');
  empty.style.display = 'none';
  blocked.style.display = 'flex';
  const name = decodeURIComponent(url.split('/').pop().split('?')[0]) || url;
  document.getElementById('blockedname').textContent = name;
  openbtn.onclick = () => openPopup(url);
}

// ── Boutons popup ─────────────────────────────────────────────────────────────
popbtn.addEventListener('click', () => { if (st.url) openPopup(st.url); });

// ── Grist ─────────────────────────────────────────────────────────────────────
grist.ready({ requiredAccess: 'read table', onEditOptions: openModal });

let lastRow = null;
let recordReceived = false;

// Si onRecord ne se déclenche pas en 4s → le widget n'est pas lié à une table
setTimeout(() => {
  if (!recordReceived) {
    showEmpty('⚠ Liez ce widget à votre table : panneau droite → Données → sélectionnez votre table');
  }
}, 4000);

// Convertit github.com/.../blob/... → raw.githubusercontent.com/...
function normalizeUrl(url) {
  const m = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/(.+)$/);
  if (m) return `https://raw.githubusercontent.com/${m[1]}/${m[2]}/${m[3]}`;
  return url;
}

function processRow(row) {
  if (!st.col || !row) { showEmpty('Configurez via ··· → Paramètres'); return; }
  const v = row[st.col];
  if (!v) { showEmpty('Valeur vide pour cette ligne'); return; }

  let url;
  if (st.type === 'attachment') {
    const ids = Array.isArray(v) ? v.filter(n => typeof n === 'number') : [];
    if (!ids.length) { showEmpty('Aucune pièce jointe'); return; }
    url = location.origin + '/api/attachments/' + ids[0] + '/download';
  } else {
    url = normalizeUrl(String(v).trim());
  }

  st.url = url;
  if (isSameOrigin(url)) {
    showPDF(url);
  } else {
    showBlocked(url);
  }
}

grist.onOptions(o => {
  if (o?.col)  st.col  = o.col;
  if (o?.type) st.type = o.type;
  ctype.value = st.type || 'url';
  rebuild();
  if (lastRow) processRow(lastRow); // retraite la ligne courante si config change
});

grist.onRecords(rows => {
  if (!rows?.length) return;
  st.cols = Object.keys(rows[0]).filter(k => k !== 'id');
  rebuild();
});

grist.onRecord(row => {
  lastRow = row;
  recordReceived = true;
  processRow(row);
});

// ── Modal config ──────────────────────────────────────────────────────────────
async function openModal() { ov.classList.add('on'); await loadCols(); }
function closeModal() { ov.classList.remove('on'); cfgerr.style.display = 'none'; }

document.getElementById('bno').onclick  = closeModal;
ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
document.getElementById('bref').onclick = e => { e.stopPropagation(); loadCols(); };
document.getElementById('bok').onclick  = () => {
  if (!csel.value) { showCfgErr('Sélectionnez une colonne.'); return; }
  st.col = csel.value; st.type = ctype.value;
  grist.setOptions({ col: st.col, type: st.type });
  closeModal();
};

async function loadCols() {
  csel.disabled = true;
  csel.innerHTML = '<option value="">Chargement...</option>';
  cfgerr.style.display = 'none';

  // Toujours tenter fetchSelectedTable (plus fiable)
  try {
    const data = await grist.docApi.fetchSelectedTable();
    const cols = Object.keys(data).filter(k => k !== 'id');
    if (cols.length) { st.cols = cols; rebuild(); csel.disabled = false; return; }
  } catch { /* pas encore lié */ }

  // Fallback : colonnes reçues via onRecords
  if (st.cols.length) { rebuild(); csel.disabled = false; return; }

  // Rien : afficher l'aide
  showCfgErr('Aucune colonne. Dans Grist, panneau droite > Donnees > selectionnez votre table, puis cliquez le bouton Recharger.');
  csel.innerHTML = '<option value="">— sélectionner —</option>';
  csel.disabled = false;
}

function rebuild() {
  const prev = csel.value || st.col;
  csel.innerHTML = '<option value="">— sélectionner —</option>';
  st.cols.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === prev) o.selected = true;
    csel.appendChild(o);
  });
  ctype.value = st.type || 'url';
}

function showCfgErr(m) { cfgerr.textContent = m; cfgerr.style.display = 'block'; }
</script>
</body>
</html>
