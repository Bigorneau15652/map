<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Viewer</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; width: 100%; overflow: hidden; }

    /* ── Bouton unique, pleine surface ────────────────────── */
    #btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%; height: 100%;
      border: none;
      background: #2980b9;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background .15s;
      padding: 8px 16px;
    }
    #btn:hover        { background: #3498db; }
    #btn:active       { background: #1c6ea4; }
    #btn.state-empty  { background: #95a5a6; cursor: default; }
    #btn.state-live   { background: #27ae60; }
    #btn.state-live:hover { background: #2ecc71; }

    #btn svg { width: 24px; height: 24px; flex-shrink: 0; }
    .txt { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; min-width: 0; }
    #lbl  { font-size: 13px; font-weight: 700; white-space: nowrap; }
    #sub  { font-size: 10px; opacity: .8;
            max-width: 200px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; }

    /* ── Modal config (menu ···) ──────────────────────────── */
    #ov {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 50;
      align-items: center; justify-content: center;
    }
    #ov.on { display: flex; }
    #box {
      background: #fff; border-radius: 8px;
      box-shadow: 0 6px 28px rgba(0,0,0,.22);
      padding: 20px; width: 270px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #box h3 { font-size: 13px; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid #e0e0e0; color: #333; }
    .row { margin-bottom: 12px; }
    .row label { display: block; font-size: 10px; font-weight: 700;
      color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .rf { display: flex; gap: 6px; }
    .rf select, .row select {
      width: 100%; padding: 7px 9px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 12px; color: #333; background: #fff;
    }
    #bref { padding: 0 10px; border: 1px solid #ccc; border-radius: 5px;
      background: #fff; cursor: pointer; font-size: 16px; flex-shrink: 0; }
    .acts { display: flex; gap: 8px; margin-top: 16px; }
    .ok, .no { flex: 1; padding: 8px; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 700; cursor: pointer; }
    .ok { background: #2980b9; color: #fff; }
    .ok:hover { background: #3498db; }
    .no { background: #ecf0f1; color: #333; }
    #err { display:none; margin-top:8px; font-size:11px; color:#c0392b;
      background:#fdf0ef; padding:6px 8px; border-radius:4px; line-height:1.5; }
    #hint { margin-top:10px; font-size:10px; color:#666; line-height:1.6;
      background:#eef6ff; padding:7px 9px; border-radius:4px;
      border-left:3px solid #2980b9; }
  </style>
</head>
<body>

<button id="btn" class="state-empty">
  <svg viewBox="0 0 32 32" fill="none">
    <rect x="3" y="1" width="20" height="26" rx="2"
      fill="white" opacity=".2" stroke="white" stroke-width="1.2"/>
    <path d="M19 1L23 5H19V1Z" fill="white" opacity=".5"/>
    <text x="13" y="20" text-anchor="middle" font-size="7" font-weight="bold"
      fill="white" font-family="sans-serif">PDF</text>
    <circle cx="26" cy="26" r="5" fill="white" opacity=".25" stroke="white"/>
    <path d="M23 26h6M26 23v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div class="txt">
    <span id="lbl">Configurez via ···</span>
    <span id="sub"></span>
  </div>
</button>

<!-- Modal paramètres -->
<div id="ov">
  <div id="box">
    <h3>⚙ Paramètres — PDF Viewer</h3>
    <div class="row">
      <label>Colonne PDF</label>
      <div class="rf">
        <select id="csel"><option value="">— sélectionner —</option></select>
        <button id="bref" title="Recharger">↺</button>
      </div>
    </div>
    <div class="row">
      <label>Type</label>
      <select id="ctype">
        <option value="url">URL (texte)</option>
        <option value="attachment">Pièce jointe Grist</option>
      </select>
    </div>
    <div id="hint">
      💡 Liste vide ? Dans Grist, panneau de droite → <strong>Données</strong>
      → sélectionnez votre table, puis ↺
    </div>
    <div id="err"></div>
    <div class="acts">
      <button class="no" id="bno">Annuler</button>
      <button class="ok" id="bok">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── État ───────────────────────────────────────────────────────────────────────
const WIN_NAME = 'grist-pdf-viewer';
const st = { col: null, type: 'url', url: null, name: null, cols: [] };

const btn  = document.getElementById('btn');
const lbl  = document.getElementById('lbl');
const sub  = document.getElementById('sub');
const ov   = document.getElementById('ov');
const csel = document.getElementById('csel');
const ctype= document.getElementById('ctype');
const err  = document.getElementById('err');

// ── Clic → ouvre le PDF directement, sans intermédiaire ───────────────────────
btn.addEventListener('click', () => {
  if (!st.url) return;
  // window.open avec le même nom réutilise la fenêtre existante
  // → pas de page blanche, pas de viewer.html, pas de CORS
  const w = screen.width  > 1400 ? 1200 : screen.width  - 100;
  const h = screen.height > 900  ? 860  : screen.height - 100;
  const l = Math.max(0, (screen.width  - w) / 2);
  const t = Math.max(0, (screen.height - h) / 2);
  window.open(st.url, WIN_NAME, `width=${w},height=${h},left=${l},top=${t},resizable=yes`);
  btn.className = 'state-live';
  lbl.textContent = '● Viewer ouvert';
});

// ── Grist ─────────────────────────────────────────────────────────────────────
grist.ready({ requiredAccess: 'read table', onEditOptions: openModal });

grist.onOptions(o => {
  if (o?.col)  st.col  = o.col;
  if (o?.type) st.type = o.type;
  ctype.value = st.type || 'url';
  rebuild();
});

grist.onRecords(rows => {
  if (!rows?.length) return;
  st.cols = Object.keys(rows[0]).filter(k => k !== 'id');
  rebuild();
});

grist.onRecord(row => {
  if (!st.col || !row) { setEmpty('Configurez via ··· → Paramètres'); return; }
  const v = row[st.col];
  if (!v) { setEmpty('Valeur vide pour cette ligne'); return; }

  let url, name;
  if (st.type === 'attachment') {
    const ids = Array.isArray(v) ? v.filter(n => typeof n === 'number') : [];
    if (!ids.length) { setEmpty('Aucune pièce jointe'); return; }
    url  = location.origin + '/api/attachments/' + ids[0] + '/download';
    name = 'Pièce jointe #' + ids[0];
  } else {
    url  = String(v).trim();
    name = decodeURIComponent(url.split('/').pop().split('?')[0]) || 'document.pdf';
  }

  st.url = url; st.name = name;
  btn.className = 'state-ready';
  lbl.textContent = '▶  Ouvrir le PDF';
  sub.textContent = name;

  // Si la fenêtre viewer est déjà ouverte, la mettre à jour automatiquement
  try {
    const w = window.open('', WIN_NAME); // tente de récupérer la fenêtre existante
    if (w && !w.closed && w.location.href !== 'about:blank') {
      w.location.href = url;             // navigue vers le nouveau PDF
      btn.className = 'state-live';
      lbl.textContent = '● Viewer mis à jour';
    }
  } catch { /* fenêtre non accessible (cross-origin normal) */ }
});

// ── Modal config ───────────────────────────────────────────────────────────────
async function openModal() { ov.classList.add('on'); await loadCols(); }
function closeModal() { ov.classList.remove('on'); err.style.display = 'none'; }

document.getElementById('bno').onclick  = closeModal;
ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
document.getElementById('bref').onclick = e => { e.stopPropagation(); loadCols(); };
document.getElementById('bok').onclick  = () => {
  if (!csel.value) { showErr('Sélectionnez une colonne.'); return; }
  st.col = csel.value; st.type = ctype.value;
  grist.setOptions({ col: st.col, type: st.type });
  closeModal();
};

async function loadCols() {
  csel.disabled = true;
  csel.innerHTML = '<option value="">⏳ Chargement…</option>';
  try {
    const data = await grist.docApi.fetchSelectedTable();
    st.cols = Object.keys(data).filter(k => k !== 'id');
    if (!st.cols.length) throw 0;
    rebuild();
  } catch {
    showErr('Liez d\'abord le widget à une table\n(Panneau Grist → Données → votre table).');
    csel.innerHTML = '<option value="">— sélectionner —</option>';
  } finally { csel.disabled = false; }
}

function rebuild() {
  const prev = csel.value || st.col;
  csel.innerHTML = '<option value="">— sélectionner —</option>';
  st.cols.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === prev) o.selected = true;
    csel.appendChild(o);
  });
  ctype.value = st.type || 'url';
}

function setEmpty(msg) {
  st.url = null;
  btn.className = 'state-empty';
  lbl.textContent = msg;
  sub.textContent = '';
}

function showErr(m) { err.textContent = m; err.style.display = 'block'; }
</script>
</body>
</html>
